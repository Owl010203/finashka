<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0a0d14"/>
<title>Финашка</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0a0d14;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;color:#f1f5f9;min-height:100vh}
input,button{font-family:inherit}
#app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:80px}
.header{background:linear-gradient(135deg,#0a0d14,#111827);padding:16px 16px 12px;border-bottom:1px solid #1e2d45;position:sticky;top:0;z-index:50}
.hrow{display:flex;justify-content:space-between;align-items:center}
.hlabel{font-size:10px;color:#64748b;letter-spacing:1px}
.hmonth{font-size:19px;font-weight:800}
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#0d1117;border-top:1px solid #1e2d45;display:flex;z-index:100}
.tbtn{flex:1;background:none;border:none;padding:8px 2px 12px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}
.ticon{font-size:18px}
.tlabel{font-size:9px;color:#64748b;font-weight:400}
.tbtn.on .tlabel{color:#10b981;font-weight:700}
.tdot{width:4px;height:4px;border-radius:2px;background:#10b981;display:none}
.tbtn.on .tdot{display:block}
.content{padding:14px 14px 0}
.card{background:#111827;border-radius:16px;border:1px solid #1e2d45;padding:14px;margin-bottom:12px}
.btn{border:none;border-radius:12px;padding:12px 20px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;display:inline-flex;align-items:center;gap:6px;justify-content:center}
.btn.full{width:100%}
.btn.sm{padding:6px 12px;font-size:12px;border-radius:8px}
.btn.green{background:#10b981}.btn.red{background:#ef4444}.btn.blue{background:#3b82f6}.btn.gold{background:#f59e0b}.btn.gray{background:#1e2d45}
.field{margin-bottom:12px}
.flabel{color:#64748b;font-size:11px;margin-bottom:4px;letter-spacing:0.5px;display:block}
.finp{width:100%;background:#0f172a;border:1px solid #1e2d45;border-radius:10px;color:#f1f5f9;padding:10px 12px;font-size:15px;outline:none}
.toggle-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.ttrack{width:44px;height:24px;border-radius:12px;background:#1e2d45;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.ttrack.on{background:#10b981}
.tthumb{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:9px;background:#fff;transition:left .2s}
.ttrack.on .tthumb{left:22px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end}
.modal{background:#111827;border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:85vh;overflow-y:auto;border:1px solid #1e2d45}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mtitle{font-weight:700;font-size:17px}
.mclose{background:none;border:none;color:#64748b;font-size:22px;line-height:1;cursor:pointer}
.sec{font-size:11px;color:#64748b;letter-spacing:0.5px;margin-bottom:8px;display:block}
.badge{display:inline-block;border-radius:8px;padding:2px 8px;font-size:11px;font-weight:700;margin:2px}
.prog{height:8px;background:#1e2d45;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .5s}
.prog5{height:5px;background:#1e2d45;border-radius:4px;overflow:hidden;margin:8px 0 14px}
.prog5-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#10b981,#f59e0b)}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mini{background:#0a0f1a;border-radius:12px;padding:10px 6px;text-align:center}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-name{font-size:11px;color:#64748b;width:38px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:22px;background:#0a0f1a;border-radius:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:6px;font-size:10px;font-weight:700;color:#fff;transition:width .5s;min-width:2px}
.ecard{background:#111827;border-radius:14px;border:1px solid #1e2d45;padding:12px 14px;margin-bottom:8px;cursor:pointer}
.ecard:active{opacity:.8}
.row{display:flex;justify-content:space-between;align-items:center}
.col{display:flex;flex-direction:column;gap:2px}
.empty{text-align:center;color:#64748b;padding:40px 0;font-size:14px}
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 220px)}
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-bottom:8px}
.bubble{max-width:82%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.55;white-space:pre-wrap}
.buser{background:#064e3b;border:1px solid #10b98144;align-self:flex-end;border-radius:18px 18px 4px 18px}
.bai{background:#111827;border:1px solid #1e2d45;align-self:flex-start;border-radius:18px 18px 18px 4px}
.cinp-row{display:flex;gap:8px;margin-top:8px}
.cinp{flex:1;background:#0f172a;border:1px solid #1e2d45;border-radius:12px;color:#f1f5f9;padding:12px 14px;font-size:14px;outline:none}
.csend{background:#10b981;border:none;border-radius:12px;padding:0 16px;font-size:18px;color:#fff;cursor:pointer}
.qbtns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.qbtn{background:#064e3b;color:#10b981;border:1px solid #10b98144;border-radius:20px;padding:6px 12px;font-size:12px;cursor:pointer}
.tsel{display:flex;gap:8px;margin-bottom:12px}
.tselb{flex:1;padding:10px;border-radius:10px;border:2px solid #1e2d45;background:#0f172a;color:#f1f5f9;font-weight:700;font-size:13px;cursor:pointer}
.tselb.ag{border-color:#10b981;background:#10b98122}
.tselb.ar{border-color:#ef4444;background:#ef444422}
.icg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.ico{background:none;border:1px solid transparent;border-radius:8px;padding:4px;font-size:22px;cursor:pointer}
.ico.sel{background:#064e3b;border-color:#10b981}
.colg{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.cold{width:32px;height:32px;border-radius:8px;cursor:pointer;border:2px solid transparent}
.cold.sel{border-color:#fff}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="hrow">
      <div><div class="hlabel">ФИНАШКА</div><div class="hmonth" id="hm"></div></div>
      <div style="text-align:right">
        <div style="font-size:10px;color:#64748b">Средства сейчас</div>
        <div id="hf" style="font-size:19px;font-weight:800"></div>
        <div style="font-size:10px;color:#64748b">месяц: <span id="hb"></span></div>
      </div>
    </div>
  </div>
  <div class="content" id="cnt"></div>
  <div class="tabbar" id="tb"></div>
</div>
<script>
// STORAGE
const K={m:"fn:m",f:"fn:f",fx:"fn:fx",s:"fn:s",d:"fn:d"};
const sg=k=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}};
const ss=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}};

// STATE
let S={
  tab:"today",
  months:sg(K.m)||{},
  funds:sg(K.f)||[
    {id:"1",name:"Отпуск",icon:"✈️",target:150000,current:0,color:"#3b82f6",pct:10},
    {id:"2",name:"Резерв",icon:"🛡️",target:100000,current:0,color:"#10b981",pct:15},
    {id:"3",name:"Покупка",icon:"🎯",target:50000,current:0,color:"#f59e0b",pct:5},
  ],
  fixed:sg(K.fx)||[
    {id:"1",name:"Квартплата",amount:5000,day:20,icon:"🏠"},
    {id:"2",name:"Связь",amount:399,day:25,icon:"📱"},
    {id:"3",name:"Подписки",amount:500,day:1,icon:"📺"},
  ],
  cfg:sg(K.s)||{salary:0,parentHelp:0,parentRegular:false,salaryLimitPct:65,baseAmount:0},
  debts:sg(K.d)||[],
  aiHist:[],
};

const save=()=>{ss(K.m,S.months);ss(K.f,S.funds);ss(K.fx,S.fixed);ss(K.s,S.cfg);ss(K.d,S.debts)};

// UTILS
const fmt=n=>Number(n||0).toLocaleString("ru-RU")+" ₽";
const mk=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")};
const ml=m=>{const[y,mo]=m.split("-");return["Янв","Фев","Мар","Апр","Май","Июн","Июл","Авг","Сен","Окт","Ноя","Дек"][+mo-1]+" "+y};
const td=()=>new Date().toISOString().split("T")[0];
const dim=(d=new Date())=>new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
const entries=()=>S.months[mk()]?.entries||[];

const tots=()=>entries().reduce((a,x)=>({
  salary:a.salary+(x.salary||0),parents:a.parents+(x.parents||0),other:a.other+(x.other||0),
  guaranteed:a.guaranteed+(x.guaranteed||0),planned:a.planned+(x.planned||0),
  unplanned:a.unplanned+(x.unplanned||0),transport:a.transport+(x.transport||0),
}),{salary:0,parents:0,other:0,guaranteed:0,planned:0,unplanned:0,transport:0});

const curFunds=()=>{
  const all=Object.values(S.months).reduce((a,m)=>{
    const e=m.entries||[];
    return{inc:a.inc+e.reduce((s,x)=>s+(x.salary||0)+(x.parents||0)+(x.other||0),0),
           exp:a.exp+e.reduce((s,x)=>s+(x.guaranteed||0)+(x.planned||0)+(x.unplanned||0)+(x.transport||0),0)};
  },{inc:0,exp:0});
  return (S.cfg.baseAmount||0)+all.inc-all.exp;
};

const dlimit=()=>S.cfg.salary>0?Math.round(S.cfg.salary*(S.cfg.salaryLimitPct||65)/100/dim()):0;

// DOM HELPERS
const el=(tag,cls,html,style)=>{const e=document.createElement(tag);if(cls)e.className=cls;if(html!==undefined)e.innerHTML=html;if(style)e.style.cssText=style;return e};
const div=(cls,style)=>el("div",cls,"",style);
const span=(cls,txt)=>{const s=el("span",cls);s.textContent=txt;return s};
const btn=(label,cls,onClick,fullw)=>{const b=el("button","btn "+cls+(fullw?" full":""));b.textContent=label;b.addEventListener("click",onClick);return b};
const field=(label,type,val,onChange,placeholder,icon)=>{
  const w=div("field");
  if(label){const lb=el("label","flabel");lb.textContent=(icon?icon+" ":"")+label.toUpperCase();w.appendChild(lb)}
  const inp=el("input","finp");inp.type=type;inp.value=val||"";inp.placeholder=placeholder||"";
  inp.addEventListener("input",e=>onChange(e.target.value));
  inp.addEventListener("change",e=>onChange(e.target.value));
  w.appendChild(inp);return w;
};

let modalEl=null;
const openModal=content=>{
  const ov=div("overlay");
  const m=div("modal");
  m.addEventListener("click",e=>e.stopPropagation());
  ov.addEventListener("click",closeModal);
  m.appendChild(content);ov.appendChild(m);
  document.body.appendChild(ov);modalEl=ov;
};
const closeModal=()=>{modalEl?.remove();modalEl=null};

const mhead=(title)=>{
  const row=div("mhead");
  const t=el("span","mtitle");t.textContent=title;
  const x=el("button","mclose");x.textContent="✕";x.addEventListener("click",closeModal);
  row.appendChild(t);row.appendChild(x);return row;
};

const toggle=(label,val,onChange)=>{
  const row=div("toggle-row");
  const lb=el("span");lb.textContent=label;lb.style.fontSize="14px";
  const tr=div("ttrack"+(val?" on":""));
  const th=div("tthumb");tr.appendChild(th);
  tr.addEventListener("click",()=>onChange(!val));
  row.appendChild(lb);row.appendChild(tr);return row;
};

// ══════════ TODAY ══════════
function renderToday(){
  const w=div(""),t=tots(),s=S.cfg;
  const inc=t.salary+t.parents+t.other;
  const exp=t.guaranteed+t.planned+t.unplanned+t.transport;
  const bal=inc-exp,cf=curFunds(),dl=dlimit();
  const day=new Date().getDate(),dTotal=dim();
  const monthPct=Math.round(day/dTotal*100);
  const plannedInc=(s.salary||0)+(s.parentRegular?(s.parentHelp||0):0);
  const fixedTotal=S.fixed.reduce((a,f)=>a+f.amount,0);
  const forecastBal=plannedInc-fixedTotal-t.planned-t.unplanned-t.transport;
  const todayExp=entries().filter(e=>e.date===td()).reduce((a,e)=>a+(e.guaranteed||0)+(e.planned||0)+(e.unplanned||0)+(e.transport||0),0);
  const dailyOk=dl===0||todayExp<=dl;

  // OVERVIEW CARD
  const oc=div("card","background:linear-gradient(135deg,#0f2027,#1a3a2a);border-color:#10b98133");
  const r1=div("row");r1.appendChild(span("sec","📅 ОБЗОР МЕСЯЦА"));
  const d2=el("span","","");d2.textContent=day+" из "+dTotal+" дней";d2.style.cssText="font-size:11px;color:#64748b";
  r1.appendChild(d2);r1.style.marginBottom="0";oc.appendChild(r1);
  const p5=div("prog5");const p5f=div("prog5-fill");p5f.style.width=monthPct+"%";p5.appendChild(p5f);oc.appendChild(p5);

  oc.appendChild(span("sec","ПОСТУПЛЕНИЯ"));
  const g3=div("g3");
  [[t.salary,s.salary,"Зарплата","💼","#10b981"],[t.parents,s.parentRegular?s.parentHelp:null,"Родители","👨‍👩‍👦","#8b5cf6"],[t.other,null,"Прочее","💸","#3b82f6"]].forEach(([val,plan,label,icon,color])=>{
    const mc=div("mini");
    mc.innerHTML=`<div style="font-size:15px">${icon}</div><div style="font-size:14px;font-weight:800;color:${color};margin-top:2px">${fmt(val)}</div><div style="font-size:9px;color:#64748b">${label}</div>`;
    if(plan!==null&&plan>0){const sub=el("div","","из "+fmt(plan));sub.style.cssText=`font-size:9px;color:${val>=plan?"#10b981":"#f59e0b"}`;mc.appendChild(sub)}
    g3.appendChild(mc);
  });
  oc.appendChild(g3);

  oc.appendChild(span("sec","РАСХОДЫ"));
  const g2=div("g2");
  [[t.guaranteed,"Гарантир.","🏠","#3b82f6"],[t.planned,"Плановые","📋","#f59e0b"],[t.unplanned,"Внеплан.","⚡","#ef4444"],[t.transport,"Транспорт","🚗","#a855f7"]].forEach(([val,label,icon,color])=>{
    const mc=div("mini");mc.innerHTML=`<div style="font-size:15px">${icon}</div><div style="font-size:14px;font-weight:800;color:${color};margin-top:2px">${fmt(val)}</div><div style="font-size:9px;color:#64748b">${label}</div>`;g2.appendChild(mc);
  });
  oc.appendChild(g2);

  const cfCard=div("row","margin-top:8px;background:linear-gradient(135deg,#0f1e30,#0a1520);border-radius:12px;padding:10px 14px");
  const cfl=div("col");
  cfl.innerHTML=`<div style="font-size:10px;color:#64748b">💳 СРЕДСТВА СЕЙЧАС</div><div style="font-size:18px;font-weight:800;color:${cf>=0?"#10b981":"#ef4444"}">${fmt(cf)}</div>`;
  cfCard.appendChild(cfl);cfCard.appendChild(el("span","","",`font-size:26px`));
  cfCard.querySelector("span").textContent=cf>=0?"✅":"❌";
  oc.appendChild(cfCard);

  if(plannedInc>0){
    const fc=div("row","margin-top:8px;background:#0a0f1a;border-radius:12px;padding:10px 12px");
    fc.innerHTML=`<div><div style="font-size:10px;color:#64748b">ПРОГНОЗ ОСТАТКА</div><div style="font-size:16px;font-weight:800;color:${forecastBal>=0?"#10b981":"#ef4444"}">${fmt(forecastBal)}</div></div><div style="text-align:right"><div style="font-size:10px;color:#64748b">Фикс. расходы</div><div style="font-size:12px;font-weight:700;color:#ef4444">−${fmt(fixedTotal)}</div></div>`;
    oc.appendChild(fc);
  }
  w.appendChild(oc);

  // DAILY LIMIT
  if(dl>0){
    const dc=div("card","border-color:"+(dailyOk?"#10b98144":"#ef444444"));
    dc.innerHTML=`<div class="row"><div><div style="font-size:10px;color:#64748b">🎯 ЛИМИТ НА СЕГОДНЯ (${s.salaryLimitPct||65}% ÷ ${dTotal} дней)</div><div style="font-size:18px;font-weight:800;color:${dailyOk?"#10b981":"#ef4444"}">${fmt(todayExp)} <span style="font-size:13px;color:#64748b;font-weight:400">из ${fmt(dl)}</span></div></div><div style="font-size:26px">${dailyOk?"✅":"⚠️"}</div></div>`;
    const pb=div("prog","margin-top:8px");const pf=div("prog-fill");pf.style.width=Math.min(100,dl>0?todayExp/dl*100:0)+"%";pf.style.background=dailyOk?"#10b981":"#ef4444";pb.appendChild(pf);dc.appendChild(pb);
    const rem=el("div","","",`font-size:11px;color:${dailyOk?"#10b981":"#ef4444"};margin-top:6px`);rem.textContent=dailyOk?`Остаток: ${fmt(dl-todayExp)}`:`Превышение: ${fmt(todayExp-dl)}`;dc.appendChild(rem);
    w.appendChild(dc);
  }

  // DUE TODAY
  const dueFix=S.fixed.filter(f=>f.day===day);
  if(dueFix.length){
    const df=div("card","border-color:#f59e0b44");
    df.innerHTML=`<div style="font-size:11px;color:#f59e0b;margin-bottom:8px">⚠️ ПЛАТЕЖИ СЕГОДНЯ</div>`;
    dueFix.forEach(f=>{const r=div("row","padding:4px 0");r.innerHTML=`<span>${f.icon} ${f.name}</span><span style="color:#f59e0b;font-weight:700">${fmt(f.amount)}</span>`;df.appendChild(r)});
    w.appendChild(df);
  }

  // ADD BUTTON
  const ab=btn("+ Добавить запись","green",()=>openEntryModal(null),true);ab.style.marginBottom="12px";w.appendChild(ab);

  // ENTRIES
  w.appendChild(span("sec","ЗАПИСИ ЗА МЕСЯЦ"));
  const ents=entries();
  if(!ents.length){const em=div("empty");em.textContent="Записей пока нет";w.appendChild(em)}
  else[...ents].reverse().forEach((e,ri)=>{
    const idx=ents.length-1-ri;
    const ei=(e.salary||0)+(e.parents||0)+(e.other||0);
    const ex=(e.guaranteed||0)+(e.planned||0)+(e.unplanned||0)+(e.transport||0);
    const ec=div("ecard");ec.addEventListener("click",()=>openEntryModal(idx));
    const er=div("","display:flex;justify-content:space-between;align-items:flex-start");
    const el2=el("div","","","flex:1");
    el2.innerHTML=`<div style="font-size:11px;color:#64748b">${e.date}</div>${e.note?`<div style="font-size:12px;margin-top:2px">${e.note}</div>`:""}`;
    const bd=el("div","","","margin-top:6px;display:flex;flex-wrap:wrap");
    [[e.salary,"💼","#10b981"],[e.parents,"👨‍👩‍👦","#8b5cf6"],[e.other,"💸","#3b82f6"],[e.guaranteed,"🏠","#3b82f6"],[e.planned,"📋","#f59e0b"],[e.unplanned,"⚡","#ef4444"],[e.transport,"🚗","#a855f7"]].forEach(([v,ic,c])=>{
      if(v>0){const b=el("span","badge",ic+" "+fmt(v));b.style.background=c+"22";b.style.color=c;bd.appendChild(b)}
    });
    el2.appendChild(bd);
    const ev=el("div","","","text-align:right;margin-left:8px");
    if(ei>0)ev.innerHTML+=`<div style="color:#10b981;font-weight:800;font-size:14px">+${fmt(ei)}</div>`;
    if(ex>0)ev.innerHTML+=`<div style="color:#ef4444;font-weight:700;font-size:13px">−${fmt(ex)}</div>`;
    er.appendChild(el2);er.appendChild(ev);ec.appendChild(er);w.appendChild(ec);
  });
  return w;
}

function openEntryModal(idx){
  const ents=entries(),ex=idx!==null?ents[idx]:null;
  let f={date:ex?.date||td(),salary:ex?.salary||"",parents:ex?.parents||"",other:ex?.other||"",guaranteed:ex?.guaranteed||"",planned:ex?.planned||"",unplanned:ex?.unplanned||"",transport:ex?.transport||"",note:ex?.note||""};
  const w=div("");w.appendChild(mhead(idx===null?"Новая запись":"Редактировать"));
  w.appendChild(field("Дата","date",f.date,v=>f.date=v));
  const is=el("div","","","font-size:11px;color:#10b981;display:block;margin:4px 0 8px");is.textContent="📥 ПОСТУПЛЕНИЯ";w.appendChild(is);
  [["Зарплата","salary","💼"],["Помощь родителей","parents","👨‍👩‍👦"],["Прочий доход","other","💸"]].forEach(([l,k,i])=>w.appendChild(field(l,"number",f[k],v=>f[k]=v,"0",i)));
  const xs=el("div","","","font-size:11px;color:#ef4444;display:block;margin:4px 0 8px");xs.textContent="📤 РАСХОДЫ";w.appendChild(xs);
  [["Гарантированный расход","guaranteed","🏠"],["Предварительный расход","planned","📋"],["Незапланированный расход","unplanned","⚡"],["Транспорт","transport","🚗"]].forEach(([l,k,i])=>w.appendChild(field(l,"number",f[k],v=>f[k]=v,"0",i)));
  w.appendChild(field("Заметка","text",f.note,v=>f.note=v,"Описание...","📝"));

      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,system:ctx,messages:S.aiHist.map(m=>({role:m.role,content:m.content}))})});
      const data=await res.json();
      S.aiHist.push({role:"assistant",content:data.content?.map(c=>c.text||"").join("")||"Ошибка"});
      if(S.aiHist.length>20)S.aiHist=S.aiHist.slice(-20);
    }catch{S.aiHist.push({role:"assistant",content:"❌ Ошибка соединения."})}
    csb.disabled=false;renderMsgs();
  };
  inp.addEventListener("keydown",e=>{if(e.key==="Enter")send()});

  if(S.aiHist.length){const cl=el("button","","Очистить чат","background:none;border:none;color:#64748b;font-size:11px;cursor:pointer;margin-top:6px");cl.addEventListener("click",()=>{S.aiHist=[];render()});cw.appendChild(cl)}
  w.appendChild(cw);return w;
}

    const fright=div("","display:flex;gap:8px;align-items:center");
    fright.appendChild(el("span","",fmt(f.amount),"font-weight:700;color:#ef4444"));
    const eb=el("button","","✏️","background:none;border:none;color:#64748b;font-size:18px;cursor:pointer");eb.addEventListener("click",()=>openFixedModal(f));
    const db=el("button","","🗑","background:none;border:none;color:#ef4444;font-size:18px;cursor:pointer");db.addEventListener("click",()=>{S.fixed=S.fixed.filter(x=>x.id!==f.id);save();render()});
    fright.appendChild(eb);fright.appendChild(db);fr.appendChild(fl);fr.appendChild(fright);fc.appendChild(fr);w.appendChild(fc);
  });
  w.appendChild(btn("+ Добавить расход","blue",()=>openFixedModal(null),true));
  return w;
}

function openFixedModal(f){
  const ICONS=["🏠","📱","📺","🚗","💡","🌐","🏋️","📚","🎵","🛡️","💊","🍕"];
  let fm={name:f?.name||"",icon:f?.icon||"💳",amount:f?.amount||"",day:f?.day||""};
  const w=div("");w.appendChild(mhead(f?"Редактировать":"Новый фикс. расход"));
  const ig=div("icg");
  ICONS.forEach(ic=>{const ib=el("button","ico"+(ic===fm.icon?" sel":""),ic);ib.addEventListener("click",()=>{fm.icon=ic;ig.querySelectorAll(".ico").forEach(x=>x.classList.remove("sel"));ib.classList.add("sel")});ig.appendChild(ib)});
  w.appendChild(ig);
  w.appendChild(field("Название","text",fm.name,v=>fm.name=v,"Квартплата..."));
  w.appendChild(field("Сумма (₽)","number",fm.amount,v=>fm.amount=v,"5000","💳"));
  w.appendChild(field("День месяца (1–31)","number",fm.day,v=>fm.day=v,"20","📅"));
  w.appendChild(btn("Сохранить","green",()=>{
    if(!fm.name||!fm.amount)return;
    const item={...fm,id:f?.id||Date.now().toString(),amount:+fm.amount,day:+fm.day||1};
    if(f)S.fixed=S.fixed.map(x=>x.id===f.id?item:x);else S.fixed.push(item);
    save();closeModal();render();
  },true));
  openModal(w);
}

// ══════════ RENDER ══════════
const TABS=[{id:"today",icon:"🏠",label:"Главная"},{id:"debts",icon:"🤝",label:"Долги"},{id:"funds",icon:"💰",label:"Фонды"},{id:"stats",icon:"📊",label:"Статистика"},{id:"ai",icon:"🤖",label:"ИИ"},{id:"settings",icon:"⚙️",label:"Настройки"}];

function updateHeader(){
  const cf=curFunds(),t=tots();
  const inc=t.salary+t.parents+t.other,exp=t.guaranteed+t.planned+t.unplanned+t.transport,bal=inc-exp;
  document.getElementById("hm").textContent=ml(mk());
  const hf=document.getElementById("hf");hf.textContent=fmt(cf);hf.style.color=cf>=0?"#10b981":"#ef4444";
  const hb=document.getElementById("hb");hb.textContent=(bal>=0?"+":"")+fmt(bal);hb.style.color=bal>=0?"#10b981":"#ef4444";
}

function render(){
  updateHeader();
  const tb=document.getElementById("tb");tb.innerHTML="";
  TABS.forEach(t=>{
    const b=el("button","tbtn"+(S.tab===t.id?" on":""));
    b.innerHTML=`<span class="ticon">${t.icon}</span><span class="tlabel">${t.label}</span><div class="tdot"></div>`;
    b.addEventListener("click",()=>{S.tab=t.id;render()});
    tb.appendChild(b);
  });
  const cnt=document.getElementById("cnt");cnt.innerHTML="";
  const views={today:renderToday,debts:renderDebts,funds:renderFunds,stats:renderStats,ai:renderAI,settings:renderSettings};
  const v=views[S.tab]?.();if(v)cnt.appendChild(v);
}

render();
</script>
